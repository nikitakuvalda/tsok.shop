<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Регистрация · TSOK</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="account-page-body">{% include "_header.html" %}<main class="account-page"><section class="account-card" style="max-width:620px;margin:80px auto;"><span class="label">TSOK CLUB</span><h1>Регистрация</h1>{% if error %}<p class="account-result">{{ error }}</p>{% endif %}<form method="post" class="admin-subscription-form"><label>Имя<input name="name" required></label><label>Email<input name="email" type="email" required></label><label>Телефон<input name="phone"></label><label>Город<input name="city"></label><label>Адрес<input name="address"></label><label>Пароль<input name="password" type="password" minlength="6" required></label><button class="btn btn--dark w-100">Создать кабинет</button></form><p>Уже есть аккаунт? <a href="{{ url_for('account_login') }}">Войти</a></p></section></main></body></html>
